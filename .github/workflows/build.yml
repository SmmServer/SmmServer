name: Build SmmServer

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "1"
  SOURCE_DATE_EPOCH: "0"
  CEMU_TAG: "v2.6"
  CEMU_VERSION: "2.6"
  CEMU_ZIP_SHA256: "a6bcc2bc42a362d10213819948f3152fae7d47f70067f25939b51d3ddcfb0896"

jobs:
  build:
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) || github.event_name == 'workflow_dispatch' }}
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Prepare Datastore from FakeOnlineFiles
        shell: pwsh
        run: |
          $source = "Cemu/datastore"
          if (!(Test-Path $source)) {
            throw "Expected datastore at $source"
          }

          $dest = "NintendoClients/www/datastore"
          if (!(Test-Path $dest)) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
          }
          else {
            Get-ChildItem -Path $dest -Force | Remove-Item -Recurse -Force
          }

          Copy-Item -Path "$source/*" -Destination $dest -Recurse -Force

          if (-not (Get-ChildItem -Path $dest -Force | Select-Object -First 1)) {
            throw "Datastore copy completed, but NintendoClients/www/datastore is empty"
          }

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test
        run: uv run python -m py_compile main.py pretendo.py proxy.py

      - name: Build
        env:
          PYTHONHASHSEED: "1"
          SOURCE_DATE_EPOCH: "0"
        run: uv run python build.py

      - name: Make build deterministic
        env:
          PYTHONHASHSEED: "1"
          SOURCE_DATE_EPOCH: "0"
        run: |
          uv run python fix_pe_headers.py dist/SmmServer/SmmServer.exe
          uv run python fix_zip_timestamps.py dist/SmmServer/base_library.zip

      - name: Copy FakeOnlineFiles
        shell: pwsh
        run: |
          $dest = "dist/SmmServer/Cemu"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Force -Path $dest }
          Copy-Item -Path "Cemu/*" -Destination $dest -Recurse -Force

      - name: Download Cemu
        shell: pwsh
        run: |
          $url = "https://github.com/cemu-project/Cemu/releases/download/$env:CEMU_TAG/cemu-$env:CEMU_VERSION-windows-x64.zip"
          $output = "cemu.zip"
          $dest = "dist/SmmServer/Cemu"
          $expectedSha256 = "$env:CEMU_ZIP_SHA256"

          Invoke-WebRequest -Uri $url -OutFile $output

          $actualSha256 = (Get-FileHash -Path $output -Algorithm SHA256).Hash.ToLower()
          if ($actualSha256 -ne $expectedSha256) {
            throw "cemu.zip checksum mismatch. Expected $expectedSha256 but got $actualSha256"
          }

          Expand-Archive -Path $output -DestinationPath $dest -Force
          Move-Item -Path "$dest/Cemu_$env:CEMU_VERSION/*" -Destination $dest -Force
          Remove-Item -Path "$dest/Cemu_$env:CEMU_VERSION" -Recurse -Force
          Remove-Item $output

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: SmmServer-Release-${{ github.run_number }}
          path: dist/SmmServer/
          if-no-files-found: error
